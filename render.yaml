services:
  - type: web
    name: lighthouse-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_MOCK
        value: "true"
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL, e.g. https://the-lighthouse-project.vercel.app
      - key: NEWSAPI_KEY
        sync: false
      - key: GNEWS_KEY
        sync: false
